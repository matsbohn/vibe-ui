name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # 1. Build the React app → dist/
      #    vite.config.js sets base='/vibe-ui/' when NODE_ENV=production
      - name: Build React app
        run: npm run build
        env:
          NODE_ENV: production

      # 2. Build Storybook → dist/storybook/
      #    .storybook/main.js sets outputDir='../dist/storybook' and base='/vibe-ui/storybook/'
      - name: Build Storybook
        run: npm run build-storybook
        env:
          NODE_OPTIONS: --max_old_space_size=4096

      # 3. Upload the combined dist/ directory as the Pages artifact
      #    Result: /vibe-ui/          → React weather dashboard
      #            /vibe-ui/storybook/ → Storybook component library
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
